apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-logs
  labels:
    app: postgres-logs
spec:
  serviceName: postgres-logs
  replicas: 1
  selector:
    matchLabels:
      app: postgres-logs
  template:
    metadata:
      labels:
        app: postgres-logs
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: feature.node.kubernetes.io/pci-10de.present
                    operator: NotIn
                    values: ["true"]
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: logs
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-logs-auth
                  key: POSTGRES_PASSWORD
            - name: LOG_WRITER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-logs-auth
                  key: LOG_WRITER_PASSWORD
            - name: LOG_READER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-logs-auth
                  key: LOG_READER_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "logs"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "logs"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: initdb
          configMap:
            name: postgres-logs-initdb
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
