apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  labels:
    app: headless-matrix
    matrix-tag: ${TAG}
    matrix-app: ${APP_NAME}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: headless-matrix
        matrix-tag: ${TAG}
        matrix-app: ${APP_NAME}
    spec:
      priorityClassName: opportunistic
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: feature.node.kubernetes.io/pci-10de.present
                    operator: NotIn
                    values: ["true"]
      containers:
        - name: matrix
          image: node:24-bookworm-slim
          env:
            - name: PROXY_KEY
              valueFrom:
                secretKeyRef:
                  name: open-llm-proxy-secrets
                  key: proxy-key
            - name: APP_REPO
              value: "${APP_REPO}"
            - name: APP_BRANCH
              value: "${APP_BRANCH}"
            - name: GEO_AGENT_BRANCH
              value: "${GEO_AGENT_BRANCH}"
            - name: APP_NAME
              value: "${APP_NAME}"
            - name: ORIGIN
              value: "${ORIGIN}"
            - name: TRIALS
              value: "${TRIALS}"
            - name: MAX_TURNS
              value: "${MAX_TURNS}"
            - name: MODELS
              value: "${MODELS}"
            - name: QUESTIONS_B64
              value: "${QUESTIONS_B64}"
            - name: SYSTEM_PROMPT_APPEND_B64
              value: "${SYSTEM_PROMPT_APPEND_B64}"
            - name: JOB_NAME
              value: "${JOB_NAME}"
            # Durable transcript capture: upload per-cell transcript JSON +
            # summary.tsv to s3://<bucket>/experiments/<JOB_NAME>/ so they
            # survive pod GC (ttlSecondsAfterFinished). Default on; best-effort
            # (never fails the run). sync-logs.sh pulls them down automatically.
            - name: CAPTURE_TRANSCRIPTS
              value: "${CAPTURE_TRANSCRIPTS}"
            - name: CAPTURE_BUCKET
              value: "${CAPTURE_BUCKET}"
            # S3 creds reused from the same `aws` secret the proxy/consolidation
            # use. optional:true so the job still runs in namespaces without it
            # (capture is just skipped).
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef: { name: aws, key: AWS_ACCESS_KEY_ID, optional: true }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: aws, key: AWS_SECRET_ACCESS_KEY, optional: true }
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "=== headless matrix job: $JOB_NAME ==="
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                  git ca-certificates python3 python3-yaml >/dev/null

              # Clone repos into the sibling layout the headless runner expects:
              #   /work/open-llm-proxy   /work/geo-agent   /work/<APP_NAME>
              mkdir -p /work && cd /work
              git clone --depth 1 https://github.com/boettiger-lab/open-llm-proxy.git
              # geo-agent supplies the framework (Agent / DatasetCatalog /
              # ToolRegistry / createMapTools) the runner imports. Pin its branch
              # to A/B-test code-level changes (e.g. tool-description variants)
              # before they ship in a release the fleet pins.
              git clone --depth 1 --branch "$GEO_AGENT_BRANCH" \
                  https://github.com/boettiger-lab/geo-agent.git
              git clone --depth 1 --branch "$APP_BRANCH" \
                  "https://github.com/$APP_REPO.git" "$APP_NAME"

              cd /work/open-llm-proxy/headless
              npm ci --no-audit --no-fund

              # PROXY_KEY → /tmp/proxy_key (run_matrix.sh reads from this path)
              printf %s "$PROXY_KEY" > /tmp/proxy_key

              # QUESTIONS_FILE: decode base64 blob from wrapper
              QFILE=/tmp/questions.txt
              echo "$QUESTIONS_B64" | base64 -d > "$QFILE"

              # SYSTEM_PROMPT_APPEND_B64: optional overlay for A/B-testing
              # guidance variants. Appended to the cloned app's system-prompt.md
              # so the original app-specific text stays in place.
              if [ -n "${SYSTEM_PROMPT_APPEND_B64:-}" ]; then
                  SP="/work/$APP_NAME/system-prompt.md"
                  echo "" >> "$SP"
                  echo "$SYSTEM_PROMPT_APPEND_B64" | base64 -d >> "$SP"
                  echo "--- system-prompt overlay applied (last 30 lines) ---"
                  tail -30 "$SP"
                  echo "----------------------------------------------------"
              fi

              echo "--- questions ---"
              cat "$QFILE"
              echo "--- models override: ${MODELS:-<from configmap>} ---"
              echo

              # Delegate to the existing matrix script. RUNS_DIR is pod-local;
              # transcripts are dumped to stdout below so kubectl logs captures them.
              RUNS_DIR_REL="runs/$JOB_NAME"
              rc=0
              QUESTIONS_FILE="$QFILE" \
              ORIGIN="$ORIGIN" \
              TRIALS="$TRIALS" \
              MAX_TURNS="$MAX_TURNS" \
              MODELS="$MODELS" \
              RUNS_DIR="$RUNS_DIR_REL" \
                  ./run_matrix.sh "/work/$APP_NAME" || rc=$?

              echo
              echo "=== per-cell transcripts (json) ==="
              for f in "$RUNS_DIR_REL"/*.json; do
                  [ -f "$f" ] || continue
                  echo "----- $(basename "$f") -----"
                  cat "$f"
                  echo
              done

              echo "=== summary.tsv ==="
              cat "$RUNS_DIR_REL/summary.tsv" 2>/dev/null || echo "(no summary written)"

              # Durable capture: persist transcripts + summary to S3 so they
              # outlive the pod. Best-effort — never fails the run.
              if [ "${CAPTURE_TRANSCRIPTS:-true}" = "true" ] && [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
                  echo
                  echo "=== uploading transcripts to s3://${CAPTURE_BUCKET}/experiments/$JOB_NAME/ ==="
                  pip install --quiet --break-system-packages boto3 >/dev/null 2>&1 || pip install --quiet boto3 >/dev/null 2>&1 || true
                  RUNS_DIR_REL="$RUNS_DIR_REL" CAPTURE_BUCKET="$CAPTURE_BUCKET" JOB_NAME="$JOB_NAME" python3 - <<'PYUP' || echo "(transcript upload skipped/failed — non-fatal)"
              import os, glob, boto3
              s3 = boto3.client('s3', endpoint_url='http://rook-ceph-rgw-nautiluss3.rook',
                                aws_access_key_id=os.environ['AWS_ACCESS_KEY_ID'],
                                aws_secret_access_key=os.environ['AWS_SECRET_ACCESS_KEY'])
              bucket = os.environ.get('CAPTURE_BUCKET') or 'logs-open-llm-proxy'
              job = os.environ['JOB_NAME']; rd = os.environ['RUNS_DIR_REL']
              n = 0
              for f in sorted(glob.glob(rd + '/*')):
                  if os.path.isfile(f):
                      s3.upload_file(f, bucket, f"experiments/{job}/{os.path.basename(f)}"); n += 1
              print(f"uploaded {n} files to s3://{bucket}/experiments/{job}/")
              PYUP
              else
                  echo "(transcript S3 capture disabled or no AWS creds — transcripts only in this pod's stdout)"
              fi

              echo
              echo "=== filter proxy logs by origin: $ORIGIN ==="
              exit "$rc"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
              ephemeral-storage: "5Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
              ephemeral-storage: "5Gi"
